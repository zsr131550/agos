name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check src tests scripts
      - run: python -m compileall -q src tests scripts
      - run: python -m pytest --cov=agos --cov-report=term-missing -q
      - run: python -m build
      - name: verify release metadata and contents
        shell: bash
        run: |
          args=(--dist dist)
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            args+=(--tag "$GITHUB_REF_NAME")
          fi
          python scripts/verify_release.py "${args[@]}"
      - name: install built wheel
        shell: bash
        run: |
          wheel="$(find dist -maxdepth 1 -name '*.whl' -print -quit)"
          python -m pip install --no-deps --force-reinstall "$wheel"
      - run: agos version
      - run: agos --help
      - run: agos doctor --help
      - run: agos dashboard --help
      - run: agos merge-gate --help
      - uses: actions/upload-artifact@v4
        with:
          name: agos-dist
          path: dist/*
          if-no-files-found: error

  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: agos-dist
          path: dist
      - name: publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes --title "$GITHUB_REF_NAME"

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agos
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: agos-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
