name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check src tests scripts
      - run: python -m compileall -q src tests scripts
      - run: python -m pytest --cov=agos --cov-report=term-missing -q
      - run: python -m build
      - run: python -c "import glob, subprocess, sys; wheels=glob.glob('dist/*.whl'); assert wheels; subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--force-reinstall', wheels[0]])"
      - run: agos version
      - run: agos --help
      - run: agos run --help
      - run: agos merge-gate --help
      - run: agos prepare-merge-gate --help

  autonomous-readiness:
    name: autonomous-readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - name: install local agent CLIs
        run: npm install -g @openai/codex @anthropic-ai/claude-code
      - name: validate AGOS autonomous config
        run: agos config validate --json
      - name: diagnose autonomous loop readiness
        run: agos doctor --json
      - name: enforce autonomous CI policy
        run: python -m pytest tests/ci/test_autonomous_loop_ci_policy.py -q

  agos-prepare:
    name: agos-prepare
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: trusted
          fetch-depth: 0
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: subject
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "./trusted[dev]"
      - name: prepare AGOS merge-gate evidence
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        working-directory: subject
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/trusted/.agos/agos.yaml" ]; then
            echo "no .agos governance config; skipping AGOS prepare artifact"
            exit 0
          fi
          agos prepare-merge-gate \
            --base "$BASE_SHA" \
            --head "$HEAD_SHA" \
            --trusted-config "$GITHUB_WORKSPACE/trusted/.agos/agos.yaml" \
            --anchor-path ".agos/tasks/current/evidence/anchors.json" \
            --issuer "github-actions"
      - name: upload AGOS prepared task state
        if: hashFiles('trusted/.agos/agos.yaml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: agos-current-task
          path: subject/.agos/tasks/current
          include-hidden-files: true
          if-no-files-found: error

  merge-gate:
    name: merge-gate
    runs-on: ubuntu-latest
    needs: [agos-prepare]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: trusted
          fetch-depth: 0
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: subject
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "./trusted[dev]"
      - name: download AGOS prepared task state
        if: github.event_name == 'pull_request' && hashFiles('trusted/.agos/agos.yaml') != ''
        uses: actions/download-artifact@v4
        with:
          name: agos-current-task
          path: subject/.agos/tasks/current
      # Real PR-bound merge gate. Only applies when the repository carries AGOS
      # governance config on the protected base. The prepare job materializes
      # deterministic candidate evidence and a compatibility file anchor; this
      # job verifies that evidence against the submitted PR diff. Fail-closed:
      # governed PRs without matching AGOS evidence block here.
      - name: verify merge gate (real PR binding)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        working-directory: subject
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/trusted/.agos/agos.yaml" ]; then
            echo "no .agos governance state; skipping real merge-gate binding"
            exit 0
          fi
          agos merge-gate \
            --require-anchor \
            --anchor-backend file \
            --anchor-path ".agos/tasks/current/evidence/anchors.json" \
            --trusted-config "$GITHUB_WORKSPACE/trusted/.agos/agos.yaml" \
            --base "$BASE_SHA" --head "$HEAD_SHA" --json
      - name: merge-gate smoke
        working-directory: trusted
        run: python -m pytest tests/ci/test_merge_gate_smoke.py -q
