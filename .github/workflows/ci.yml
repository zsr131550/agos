name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  verify:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check src tests
      - run: python -m compileall -q src tests
      - run: python -m pytest --cov=agos --cov-report=term-missing -q
      - run: python -m build
      - run: python -c "import glob, subprocess, sys; wheels=glob.glob('dist/*.whl'); assert wheels; subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--force-reinstall', wheels[0]])"
      - run: agos version
      - run: agos --help
      - run: agos run --help
      - run: agos merge-gate --help
  merge-gate:
    name: merge-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      # Real PR-bound merge gate. Only applies when the repository carries AGOS
      # governance state (.agos/agos.yaml + active task + published anchor on the
      # PR head). Repos without .agos skip this; the smoke test below still proves
      # the command. Fail-closed: a governed repo whose PR head lacks a matching
      # anchor/task state blocks here, so the PR cannot merge.
      - name: verify merge gate (real PR binding)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ ! -d .agos ]; then
            echo "no .agos governance state; skipping real merge-gate binding"
            exit 0
          fi
          agos merge-gate \
            --require-anchor \
            --anchor-backend git-ref \
            --base "$BASE_SHA" --head "$HEAD_SHA" --json
      - name: merge-gate smoke
        run: python -m pytest tests/ci/test_merge_gate_smoke.py -q
