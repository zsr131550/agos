name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check src tests
      - run: python -m compileall -q src tests
      - run: python -m pytest --cov=agos --cov-report=term-missing -q
      - run: python -m build
      - run: python -c "import glob, subprocess, sys; wheels=glob.glob('dist/*.whl'); assert wheels; subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--force-reinstall', wheels[0]])"
      - run: agos version
      - run: agos --help
      - run: agos run --help
      - run: agos merge-gate --help
      - run: agos prepare-merge-gate --help

  autonomous-readiness:
    name: autonomous-readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - name: install local agent CLIs
        run: npm install -g @openai/codex @anthropic-ai/claude-code
      - name: validate AGOS autonomous config
        run: agos config validate --json
      - name: diagnose autonomous loop readiness
        run: agos doctor --json
      - name: enforce autonomous CI policy
        run: python -m pytest tests/ci/test_autonomous_loop_ci_policy.py -q

  real-agent-smoke:
    name: real-agent-smoke
    runs-on: ubuntu-latest
    needs: [autonomous-readiness]
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      MULTICA_API_KEY: ${{ secrets.MULTICA_API_KEY }}
      MULTICA_BASE_URL: ${{ vars.MULTICA_BASE_URL }}
      AGOS_PLANNER_SMOKE: "1"
      AGOS_PLANNER_EXECUTOR: codex_cli
      AGOS_PLANNER_BIN: codex
      AGOS_REVIEWER_SMOKE: "1"
      AGOS_REVIEWER_EXECUTOR: codex_cli
      AGOS_REVIEWER_BIN: codex
      AGOS_CODEX_WORKER_SMOKE: "1"
      AGOS_CODEX_BIN: codex
      AGOS_CLAUDE_WORKER_SMOKE: "1"
      AGOS_CLAUDE_BIN: claude
      AGOS_MULTICA_WORKER_SMOKE: "1"
      AGOS_MULTICA_BIN: ${{ vars.AGOS_MULTICA_BIN }}
      AGOS_MULTICA_AGENT: ${{ vars.AGOS_MULTICA_AGENT }}
      AGOS_OPENHANDS_WORKER_SMOKE: "1"
      AGOS_OPENHANDS_ENDPOINT: ${{ secrets.AGOS_OPENHANDS_ENDPOINT }}
      AGOS_OPENHANDS_TOKEN: ${{ secrets.AGOS_OPENHANDS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - name: install local agent CLIs
        run: npm install -g @openai/codex @anthropic-ai/claude-code
      - name: run real planner/reviewer/worker smokes
        shell: bash
        run: |
          export AGOS_MULTICA_BIN="${AGOS_MULTICA_BIN:-multica}"
          export AGOS_MULTICA_AGENT="${AGOS_MULTICA_AGENT:-Lambda}"
          python -m pytest \
            tests/integration/test_planner_cli_opt_in.py \
            tests/integration/test_reviewer_cli_opt_in.py \
            tests/integration/test_worker_adapters_opt_in.py \
            -q

  agos-prepare:
    name: agos-prepare
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - name: prepare AGOS merge-gate evidence
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ ! -f .agos/agos.yaml ]; then
            echo "no .agos governance config; skipping AGOS prepare artifact"
            mkdir -p .agos/tasks/current
            exit 0
          fi
          agos prepare-merge-gate \
            --base "$BASE_SHA" \
            --head "$HEAD_SHA" \
            --anchor-path ".agos/tasks/current/evidence/anchors.json" \
            --issuer "github-actions"
      - name: upload AGOS prepared task state
        uses: actions/upload-artifact@v4
        with:
          name: agos-current-task
          path: .agos/tasks/current
          if-no-files-found: error

  merge-gate:
    name: merge-gate
    runs-on: ubuntu-latest
    needs: [agos-prepare]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - name: download AGOS prepared task state
        if: github.event_name == 'pull_request' && hashFiles('.agos/agos.yaml') != ''
        uses: actions/download-artifact@v4
        with:
          name: agos-current-task
          path: .agos/tasks/current
      # Real PR-bound merge gate. Only applies when the repository carries AGOS
      # governance config. The prepare job materializes a fresh active task,
      # candidate evidence, candidate-bound review evidence, and a file-backend
      # trust anchor as an artifact; this job downloads that state and verifies
      # it against the submitted PR diff. Fail-closed: governed PRs without
      # matching AGOS evidence block here.
      - name: verify merge gate (real PR binding)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ ! -f .agos/agos.yaml ]; then
            echo "no .agos governance state; skipping real merge-gate binding"
            exit 0
          fi
          agos merge-gate \
            --require-anchor \
            --anchor-backend file \
            --anchor-path ".agos/tasks/current/evidence/anchors.json" \
            --base "$BASE_SHA" --head "$HEAD_SHA" --json
      - name: merge-gate smoke
        run: python -m pytest tests/ci/test_merge_gate_smoke.py -q
